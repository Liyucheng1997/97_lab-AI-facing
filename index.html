<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 虚拟形象 · 3D 表情 / 身体驱动</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- 把裸模块名映射到 CDN（three / three-vrm） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.0/lib/three-vrm.module.js"
    }
  }
  </script>
</head>
<body>
  <header class="topbar">
    <h1>🧑‍🚀 AI 虚拟形象 · 3D 表情 / 身体驱动</h1>
    <p class="subtitle">摄像头追踪你的表情和动作 → 实时驱动 3D 虚拟形象（VTuber / Animoji 风格）· 纯浏览器运行</p>
  </header>

  <main class="container">
    <section class="stage">
      <div class="canvas-wrap">
        <canvas id="three"></canvas>
        <!-- 摄像头小预览 -->
        <div class="webcam-preview" id="previewBox">
          <video id="video" playsinline autoplay muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div id="hint" class="hint">点击右侧「开启摄像头」开始</div>
      </div>

      <aside class="panel">
        <div class="control-group">
          <button id="startCam" class="btn primary" disabled>▶ 开启摄像头</button>
          <button id="stopCam" class="btn" disabled>⏹ 停止</button>
        </div>

        <h3>选择虚拟形象</h3>
        <div id="avatarList" class="avatar-list-3d"></div>
        <label class="btn file-btn" style="margin-top:8px">
          📁 上传我的 .vrm 模型
          <input type="file" id="vrmInput" accept=".vrm" hidden />
        </label>

        <h3>追踪设置</h3>
        <label class="slider">
          <span>平滑度 <em id="smoothVal">0.5</em></span>
          <input type="range" id="smoothSlider" min="0" max="0.9" step="0.05" value="0.5" />
        </label>
        <label class="slider">
          <span>转头幅度 <em id="headVal">1.0</em></span>
          <input type="range" id="headSlider" min="0.3" max="2.0" step="0.1" value="1.0" />
        </label>
        <label class="slider">
          <span>身体幅度 <em id="bodyVal">0.7</em></span>
          <input type="range" id="bodySlider" min="0" max="1.2" step="0.05" value="0.7" />
        </label>
        <label class="toggle">
          <input type="checkbox" id="mirror" checked />
          <span>镜像（自拍模式）</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="bodyTracking" checked />
          <span>驱动身体动作</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="useOpenPose" checked />
          <span>使用 OpenPose 后端</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="bodyFlipY" checked />
          <span>上下翻转身体点</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="bodySwapSides" />
          <span>左右交换身体点</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="showPreview" checked />
          <span>显示摄像头预览</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="showMesh" />
          <span>预览里显示身体关键点</span>
        </label>

        <div id="status" class="status">正在加载 3D 引擎和 AI 模型…</div>
        <div id="openposeStatus" class="status">OpenPose 后端未连接</div>
        <p class="tip">提示：拖动可旋转视角、滚轮缩放。转头、眨眼、张嘴、微笑、抬手、屈肘都会被模仿。</p>
      </aside>
    </section>
  </main>

  <footer class="foot">
    three.js + @pixiv/three-vrm + MediaPipe FaceLandmarker / PoseLandmarker · 全部计算在本地浏览器完成
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
